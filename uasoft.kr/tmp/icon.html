<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    width: 100%;
    height: 100%;
  }
  body {
    width: 100%;
    min-height: 100vh;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon {
    width: min(512px, 90vmin);
    height: min(512px, 90vmin);
    background: linear-gradient(145deg, #E1306C 0%, #F77737 50%, #FCAF45 100%);
    border-radius: 96px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    position: relative;
    overflow: hidden;
  }

  /* 배경 그리드 장식 */
  .grid-bg {
    position: absolute;
    inset: 0;
    opacity: 0.08;
    background-image:
      linear-gradient(white 1px, transparent 1px),
      linear-gradient(90deg, white 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* 미니 피드 그리드 */
  .feed-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    position: relative;
    z-index: 1;
  }
  .cell {
    width: 72px;
    height: 72px;
    border-radius: 10px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(4px);
  }
  .cell.bright {
    background: rgba(255,255,255,0.45);
  }

  /* 로고 텍스트 */
  .logo {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 52px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.04em;
    position: relative;
    z-index: 1;
    text-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  /* 서비스 라벨 */
  .label {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 18px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    margin-top: -10px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="icon">
  <div class="grid-bg"></div>

  <!-- 미니 피드 미리보기 -->
  <div class="feed-grid">
    <div class="cell bright"></div>
    <div class="cell"></div>
    <div class="cell bright"></div>
    <div class="cell"></div>
    <div class="cell bright"></div>
    <div class="cell"></div>
    <div class="cell bright"></div>
    <div class="cell"></div>
    <div class="cell bright"></div>
  </div>

  <!-- 로고 -->
  <div class="logo">uasoft</div>
  <div class="label">insta feed</div>
</div>
</body>
</html>
