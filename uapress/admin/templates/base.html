<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}uapress 어드민{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Noto Sans KR', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen">

  {% if session.logged_in %}
  <header class="bg-blue-700 text-white px-6 py-3 flex justify-between items-center shadow">
    <a href="/" class="font-bold text-lg">🎪 uapress 어드민</a>
    <a href="/logout" class="text-sm text-blue-200 hover:text-white">로그아웃</a>
  </header>
  {% endif %}

  <main class="max-w-5xl mx-auto px-4 py-6">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
        <div class="bg-green-100 border border-green-400 text-green-800 px-4 py-2 rounded mb-4 text-sm">
          {{ msg }}
        </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
