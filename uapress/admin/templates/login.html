{% extends "base.html" %}
{% block title %}로그인 — uapress 어드민{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-20">
  <div class="bg-white rounded-xl shadow p-8">
    <h1 class="text-2xl font-bold text-center mb-6">🎪 uapress 어드민</h1>
    <form method="post" class="space-y-4">
      <input type="password" name="password" placeholder="비밀번호"
             class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
             autofocus required>
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg">
        로그인
      </button>
    </form>
  </div>
</div>
{% endblock %}
